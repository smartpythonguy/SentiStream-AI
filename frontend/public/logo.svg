<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definition of exact brand colors -->
  <defs>
    <style>
      .brand-cyan { fill: #00F0D2; }
      .brand-green { fill: #46D32A; }
      .brand-white { fill: #FFFFFF; }
      .brand-text { font-family: 'Inter', 'Segoe UI', sans-serif; font-weight: 500; }
      .brand-bold { font-weight: 700; }
    </style>
  </defs>
  
  <!-- SentiStream AI Symbol -->
  <g transform="translate(250, 180)">
    <!-- Center Circle -->
    <path class="brand-cyan" d="M 0,-30 A 30,30 0 1,1 0,30 A 30,30 0 1,1 0,-30 Z M 0,-14 A 14,14 0 1,0 0,14 A 14,14 0 1,0 0,-14 Z" />
    <!-- Top Bracket -->
    <path class="brand-cyan" d="M -32,-48 A 58,58 0 0,1 32,-48" fill="none" stroke="#00F0D2" stroke-width="14" stroke-linecap="round" />
    <!-- Bottom Bracket -->
    <path class="brand-cyan" d="M -32,48 A 58,58 0 0,0 32,48" fill="none" stroke="#00F0D2" stroke-width="14" stroke-linecap="round" />
    <!-- Left Bracket -->
    <path class="brand-cyan" d="M -48,-32 A 58,58 0 0,0 -48,32" fill="none" stroke="#00F0D2" stroke-width="14" stroke-linecap="round" />
    <!-- Right Bracket -->
    <path class="brand-green" d="M 48,-32 A 58,58 0 0,1 48,32" fill="none" stroke="#46D32A" stroke-width="14" stroke-linecap="round" />
    <!-- Left Outer Dot -->
    <rect class="brand-cyan" x="-78" y="-16" width="14" height="32" rx="7" />
    <!-- Right Outer Dot -->
    <rect class="brand-green" x="64" y="-16" width="14" height="32" rx="7" />
  </g>

  <!-- Brand Typography -->
  <text x="250" y="380" text-anchor="middle" font-size="44" class="brand-text">
    <tspan class="brand-white">SentiStream </tspan>
    <tspan class="brand-cyan brand-bold">AI</tspan>
  </text>
</svg>
